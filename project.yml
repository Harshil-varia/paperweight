name: Paperweight
options:
  bundleIdPrefix: com.humanlayer
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  Paperweight:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      - path: Sources/Settings
      - path: Sources/Control
      - path: Sources/Overlay
      - path: Sources/Engine
      - path: Sources/UI
      # Resources live under `sources` — XcodeGen has no separate `resources`
      # key and auto-assigns build phases by file type.
      - path: Resources/Assets.xcassets   # compiled by actool → Assets.car + AppIcon
      - path: Resources/Fonts             # JetBrains Mono TTFs (copied)
      # NOTE: Resources/Shaders/Noise.metal is intentionally NOT bundled.
      # XcodeGen routes .metal to the Metal compile phase, which fails on
      # machines without the build-time Metal Toolchain. The shader is shipped
      # as an embedded string in MetalNoiseGenerator.swift and compiled at
      # runtime (see ADR-0002).
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.humanlayer.paperweight
      INFOPLIST_KEY_LSUIElement: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "6"
      COPY_PHASE_STRIP: NO
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleShortVersionString: "0.1"

  PaperweightTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.humanlayer.paperweight.tests
    dependencies:
      - target: Paperweight
